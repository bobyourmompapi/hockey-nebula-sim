<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEBULA Hockey Engine | Buffalo vs Vegas</title>
    <style>
:root {
    --bg-color: #0a0a0c;
    --panel-bg: #141418;
    --accent-gold: #b4975a;
    --accent-blue: #002654;
    --text-main: #e0e0e0;
    --text-dim: #888;
    --neon-green: #39ff14;
    --neon-red: #ff3131;
    --border: #2a2a2e;
}

* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Courier New', Courier, monospace; }

body {
    background-color: var(--bg-color);
    color: var(--text-main);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

#game-container {
    width: 95vw;
    height: 90vh;
    max-width: 1200px;
    background: var(--panel-bg);
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    box-shadow: 0 0 40px rgba(0,0,0,0.8);
}

header {
    padding: 20px;
    border-bottom: 2px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.engine-logo {
    font-size: 0.8rem;
    color: var(--text-dim);
    letter-spacing: 2px;
}

.scoreboard {
    display: flex;
    gap: 40px;
    align-items: center;
}

.score {
    font-size: 3rem;
    font-weight: bold;
    color: var(--neon-green);
    text-shadow: 0 0 10px var(--neon-green);
}

.team-name {
    font-size: 1.5rem;
    color: var(--text-dim);
}

.game-info {
    text-align: center;
    min-width: 120px;
}

#timer { font-size: 1.8rem; }
#period { font-size: 0.9rem; color: var(--accent-gold); margin-bottom: 5px; }

main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 400px;
    gap: 1px;
    background: var(--border);
    overflow: hidden;
}

.live-feed, .stats-panel {
    background: var(--panel-bg);
    display: flex;
    flex-direction: column;
}

.feed-header, .tabs {
    padding: 10px 20px;
    font-size: 0.8rem;
    background: #1c1c22;
    border-bottom: 1px solid var(--border);
}

.log-container {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
    font-size: 0.9rem;
    line-height: 1.6;
}

.log-entry { margin-bottom: 10px; border-left: 2px solid var(--border); padding-left: 10px; }
.log-entry.goal { color: var(--neon-green); font-weight: bold; }
.log-entry.penalty { color: var(--neon-red); }
.log-entry.system { color: var(--accent-gold); font-style: italic; }

.stats-table-container {
    padding: 10px;
    font-size: 0.75rem;
    overflow-y: auto;
}

table { width: 100%; border-collapse: collapse; }
th { text-align: left; color: var(--text-dim); padding-bottom: 10px; }
td { padding: 5px 0; border-bottom: 1px solid #1e1e24; }

.tab-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    padding: 5px 15px;
    cursor: pointer;
}
.tab-btn.active { color: var(--accent-gold); border-bottom: 1px solid var(--accent-gold); }

footer {
    padding: 20px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
}

button {
    background: #222;
    color: white;
    border: 1px solid var(--border);
    padding: 10px 20px;
    cursor: pointer;
    transition: all 0.3s;
}

button:hover:not(:disabled) { background: #333; border-color: var(--accent-gold); }
button:disabled { opacity: 0.3; cursor: not-allowed; }

#start-btn { color: var(--neon-green); border-color: var(--neon-green); }

.game-status {
    font-size: 0.8rem;
    color: var(--text-dim);
    display: flex;
    gap: 20px;
}

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-thumb { background: var(--border); }
    </style>
</head>
<body>
    <div id="game-container">
        <header>
            <div class="engine-logo">AETERNUS v2.0 "NEBULA"</div>
            <div class="scoreboard">
                <div class="team guest">
                    <span class="team-name">VGK</span>
                    <span id="guest-score" class="score">0</span>
                </div>
                <div class="game-info">
                    <div id="period">PERIOD 1</div>
                    <div id="timer">20:00</div>
                </div>
                <div class="team home">
                    <span id="home-score" class="score">0</span>
                    <span class="team-name">BUF</span>
                </div>
            </div>
        </header>

        <main>
            <section class="live-feed">
                <div class="feed-header">REAL-TIME PLAY-BY-PLAY</div>
                <div id="event-log" class="log-container">
                    <div class="log-entry">Engine Initialization Complete...</div>
                    <div class="log-entry">Loading Buffalo Sabres Roster...</div>
                    <div class="log-entry">Loading Vegas Golden Knights Roster...</div>
                    <div class="log-entry system">System Ready. Press Start to Begin Simulation.</div>
                </div>
            </section>

            <aside class="stats-panel">
                <div class="tabs">
                    <button class="tab-btn active" onclick="showTab('buf')">BUFFALO</button>
                    <button class="tab-btn" onclick="showTab('vgk')">VEGAS</button>
                </div>
                <div id="stats-content" class="stats-table-container">
                    <!-- Stats injected here -->
                </div>
            </aside>
        </main>

        <footer>
            <div class="controls">
                <button id="start-btn" onclick="game.start()">START SIMULATION</button>
                <button id="pause-btn" onclick="game.togglePause()" disabled>PAUSE</button>
            </div>
            <div class="game-status">
                <span id="possession">Puck Neutral</span>
                <span id="powerplay"></span>
            </div>
        </footer>
    </div>
    <script>
class HockeyEngine {
    constructor() {
        this.paused = false;
        this.running = false;
        this.period = 1;
        this.time = 1200; // 20 minutes in seconds
        this.tickRate = 1000; // ms per game second
        this.teams = {
            buf: {
                name: "Buffalo Sabres",
                score: 0,
                color: "#002654",
                roster: [
                    { name: "Tage Thompson", pos: "C", ovr: 90, g: 0, a: 0, s: 0, h: 0, p: 0, fatigue: 100 },
                    { name: "Alex Tuch", pos: "RW", ovr: 87, g: 0, a: 0, s: 0, h: 0, p: 0, fatigue: 100 },
                    { name: "Rasmus Dahlin", pos: "D", ovr: 91, g: 0, a: 0, s: 0, h: 0, p: 0, fatigue: 100 },
                    { name: "Owen Power", pos: "D", ovr: 86, g: 0, a: 0, s: 0, h: 0, p: 0, fatigue: 100 },
                    { name: "Ukko-Pekka Luukkonen", pos: "G", ovr: 85, saves: 0, ga: 0 }
                ]
            },
            vgk: {
                name: "Vegas Golden Knights",
                score: 0,
                color: "#b4975a",
                roster: [
                    { name: "Jack Eichel", pos: "C", ovr: 91, g: 0, a: 0, s: 0, h: 0, p: 0, fatigue: 100 },
                    { name: "Mark Stone", pos: "RW", ovr: 89, g: 0, a: 0, s: 0, h: 0, p: 0, fatigue: 100 },
                    { name: "Alex Pietrangelo", pos: "D", ovr: 88, g: 0, a: 0, s: 0, h: 0, p: 0, fatigue: 100 },
                    { name: "Shea Theodore", pos: "D", ovr: 87, g: 0, a: 0, s: 0, h: 0, p: 0, fatigue: 100 },
                    { name: "Adin Hill", pos: "G", ovr: 86, saves: 0, ga: 0 }
                ]
            }
        };
        this.activeTab = 'buf';
        this.init();
    }

    init() {
        this.updateStatsTable();
    }

    start() {
        if (this.running) return;
        this.running = true;
        document.getElementById('start-btn').disabled = true;
        document.getElementById('pause-btn').disabled = false;
        this.log("Puck drop! Game simulation started.");
        this.loop();
    }

    togglePause() {
        this.paused = !this.paused;
        document.getElementById('pause-btn').innerText = this.paused ? "RESUME" : "PAUSE";
    }

    log(msg, type = '') {
        const container = document.getElementById('event-log');
        const entry = document.createElement('div');
        entry.className = `log-entry ${type}`;
        const timeStr = this.formatTime(this.time);
        entry.innerHTML = `<span style="color: #666; font-size: 0.7rem;">[${timeStr}]</span> ` + msg;
        container.prepend(entry);
    }

    formatTime(seconds) {
        const m = Math.floor(seconds / 60);
        const s = seconds % 60;
        return m + ":" + s.toString().padStart(2, '0');
    }

    updateStatsTable() {
        const team = this.teams[this.activeTab];
        let html = '<table><thead><tr><th>PLAYER</th><th>POS</th><th>G</th><th>A</th><th>S</th><th>H</th><th>OVR</th></tr></thead><tbody>';
        team.roster.forEach(p => {
            if (p.pos === 'G') {
                html += '<tr><td>' + p.name + '</td><td>' + p.pos + '</td><td colspan="4">SV: ' + p.saves + ' | GA: ' + p.ga + '</td><td>' + p.ovr + '</td></tr>';
            } else {
                html += '<tr><td>' + p.name + '</td><td>' + p.pos + '</td><td>' + p.g + '</td><td>' + p.a + '</td><td>' + p.s + '</td><td>' + p.h + '</td><td>' + p.ovr + '</td></tr>';
            }
        });
        html += '</tbody></table>';
        document.getElementById('stats-content').innerHTML = html;
    }

    loop() {
        if (!this.running) return;
        if (!this.paused) {
            this.tick();
        }
        setTimeout(() => this.loop(), this.tickRate / 4); // Fast sim
    }

    tick() {
        this.time--;
        if (this.time <= 0) {
            if (this.period < 3) {
                this.period++;
                this.time = 1200;
                this.log('End of period. Starting period ' + this.period + '.', 'system');
                document.getElementById('period').innerText = 'PERIOD ' + this.period;
            } else {
                this.running = false;
                this.log("Game Over. NEBULA Simulation concluded.", "system");
                document.getElementById('timer').innerText = "FINAL";
                return;
            }
        }

        document.getElementById('timer').innerText = this.formatTime(this.time);

        // Simulation Logic (NEBULA v2.0 Mechanics)
        if (Math.random() > 0.92) {
            this.simulateAction();
        }
    }

    simulateAction() {
        const attackingTeamKey = Math.random() > 0.5 ? 'buf' : 'vgk';
        const defendingTeamKey = attackingTeamKey === 'buf' ? 'vgk' : 'buf';
        const attacker = this.teams[attackingTeamKey];
        const defender = this.teams[defendingTeamKey];

        const playerIdx = Math.floor(Math.random() * 4);
        const player = attacker.roster[playerIdx];

        const actionRoll = Math.random();
        if (actionRoll > 0.7) {
            // Shot
            player.s++;
            this.log(player.name + ' (' + attacker.name + ') takes a shot!');
            
            const goalRoll = Math.random() * 100;
            const goalie = defender.roster[4];
            
            if (goalRoll < (player.ovr - goalie.ovr + 5)) {
                // Goal
                attacker.score++;
                player.g++;
                goalie.ga++;
                this.log('GOAL! ' + player.name + ' finds the back of the net!', 'goal');
                document.getElementById(attackingTeamKey + '-score').innerText = attacker.score;
            } else {
                goalie.saves++;
            }
        } else if (actionRoll > 0.4) {
            // Hit
            player.h++;
            this.log(player.name + ' delivers a big check in the neutral zone.');
        } else if (actionRoll > 0.35) {
          // Penalty
          this.log('PENALTY! ' + player.name + ' called for tripping.', 'penalty');
        }

        this.updateStatsTable();
    }
}

const game = new HockeyEngine();

function showTab(team) {
    game.activeTab = team;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    if (event && event.target) {
        event.target.classList.add('active');
    }
    game.updateStatsTable();
}
    </script>
</body>
</html>
